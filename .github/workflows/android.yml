name: Android CI/CD — Build & Release APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commit SHA
        run: |
          echo "Building commit: ${{ github.sha }}"
          git log --oneline -3

      - name: Clean Gradle cache
        run: rm -rf ~/.gradle/caches/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug --stacktrace 2>&1 | tee build.log

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-${{ github.sha }}
          path: build.log
          retention-days: 7

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: pixel-shooter-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  release:
    name: Create Release (on tag push)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release-unsigned.apk
          name: "Pixel Shooter ${{ github.ref_name }}"
          body: |
            ## 像素飞机大战 ${{ github.ref_name }}
            
            ### 本版本内容
            - 5个关卡，每关独特Boss
            - 3架飞机：猎鹰号、风暴号、猎鹰II号
            - 道具系统、关卡解锁、存档
            
            ### 安装说明
            下载 APK 后，在 Android 设备上启用"未知来源安装"后安装。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
